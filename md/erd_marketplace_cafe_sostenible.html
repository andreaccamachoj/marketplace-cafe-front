<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0d12;
  --surface: #111318;
  --surface2: #161920;
  --border: #1c2030;
  --border-h: #283050;
  --text: #b0b8cc;
  --text-dim: #404860;
  --text-bright: #dde2ef;
  --pk: #f2c840;
  --fk: #5b90f5;
  --uq: #36c898;
  --ck: #e07070;
}

body { background: var(--bg); font-family: 'JetBrains Mono', monospace; color: var(--text); overflow: hidden; height: 100vh; }

/* ── TOP BAR ── */
#topbar {
  position: fixed; inset: 0 0 auto 0; height: 50px;
  background: rgba(11,13,18,0.97); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  z-index: 200; backdrop-filter: blur(12px);
}
.logo {
  font-family: 'Syne', sans-serif; font-size: 12.5px; font-weight: 800;
  color: var(--text-bright); letter-spacing: 0.05em; flex-shrink: 0; white-space: nowrap;
}
.vsep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.mod-legend { display: flex; gap: 6px; overflow: hidden; flex-wrap: nowrap; }
.mod-pill {
  display: flex; align-items: center; gap: 5px; font-size: 9px;
  color: var(--text-dim); white-space: nowrap; padding: 3px 8px;
  border-radius: 20px; border: 1px solid transparent; transition: all .15s; cursor: default;
}
.mod-pip { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.badge-legend { display: flex; gap: 5px; }
.bl { font-size: 8.5px; padding: 2px 5px; border-radius: 3px; font-weight: 700; }
.bl-pk { background: rgba(242,200,64,.15); color: var(--pk); }
.bl-fk { background: rgba(91,144,245,.15); color: var(--fk); }
.bl-uq { background: rgba(54,200,152,.15); color: var(--uq); }
.bl-ck { background: rgba(224,112,112,.15); color: var(--ck); }
.bl-nn { background: rgba(180,190,210,.06); color: var(--text-dim); }
.bl-df { background: rgba(180,190,210,.04); color: var(--text-dim); }
.zgroup {
  display: flex; align-items: center; gap: 2px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; padding: 2px;
}
.zbtn {
  width: 25px; height: 25px; background: none; border: none; color: var(--text);
  cursor: pointer; border-radius: 5px; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all .1s;
}
.zbtn:hover { background: var(--border); color: var(--text-bright); }
.zlabel { font-size: 10px; color: var(--text-dim); min-width: 34px; text-align: center; }
.cbtn {
  font-size: 9px; padding: 4px 8px; background: none; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim); cursor: pointer; font-family: inherit; transition: all .15s;
}
.cbtn:hover { border-color: var(--border-h); color: var(--text); }
.tbl-count { font-size: 9px; color: var(--text-dim); }

/* ── STAGE ── */
#wrap { position: fixed; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
#wrap.drag { cursor: grabbing; }
#stage { position: absolute; transform-origin: 0 0; width: 4000px; height: 3200px; }
.grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px; opacity: 0.45; pointer-events: none;
}
#svg-layer {
  position: absolute; top: 0; left: 0; width: 4000px; height: 3200px;
  pointer-events: none; overflow: visible;
}

/* ── TABLE CARDS ── */
.tbl {
  position: absolute; width: 318px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  transition: box-shadow .2s, border-color .2s; cursor: default;
}
.tbl:hover { border-color: var(--border-h); box-shadow: 0 6px 30px rgba(0,0,0,.65); }
.tbl-bar { height: 3px; }
.tbl-head { padding: 9px 12px 8px; border-bottom: 1px solid var(--border); }
.tbl-mod { font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 2px; }
.tbl-name { font-size: 13px; font-weight: 700; color: var(--text-bright); letter-spacing: .01em; }

.col {
  display: grid; grid-template-columns: 16px 1fr auto;
  align-items: start; padding: 4px 12px; gap: 4px;
  border-bottom: 1px solid rgba(28,32,48,.7); transition: background .1s;
}
.col:last-child { border-bottom: none; }
.col:hover { background: rgba(255,255,255,.016); }
.ci { font-size: 9px; padding-top: 2px; text-align: center; line-height: 1.4; }
.cb { min-width: 0; }
.cn { font-size: 11px; font-weight: 500; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.cn.pk { color: var(--pk); font-weight: 700; }
.ct { font-size: 9px; color: var(--text-dim); line-height: 1.4; }
.cbadges { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; flex-shrink: 0; }

.b { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 700; white-space: nowrap; line-height: 1.5; }
.b-pk { background: rgba(242,200,64,.14); color: var(--pk); }
.b-fk { background: rgba(91,144,245,.14); color: var(--fk); }
.b-uq { background: rgba(54,200,152,.14); color: var(--uq); }
.b-ck { background: rgba(224,112,112,.14); color: var(--ck); }
.b-nn { background: rgba(180,190,210,.06); color: #394055; }
.b-df { background: rgba(180,190,210,.04); color: #333a52; font-style: italic; }

.tbl-constraint {
  padding: 4px 12px; font-size: 8.5px; color: var(--uq);
  background: rgba(54,200,152,.04); border-top: 1px solid rgba(54,200,152,.1);
}
.tbl-note {
  padding: 5px 12px; font-size: 8.5px; color: var(--text-dim);
  background: rgba(0,0,0,.18); border-top: 1px solid var(--border);
  font-style: italic; line-height: 1.5;
}
</style>
</head>

// ─── Render legend ───
function renderLegend() {
  document.getElementById('modlegend').innerHTML =
    Object.entries(MOD).map(([,m]) =>
      `<div class="mod-pill"><div class="mod-pip" style="background:${m.color}"></div>${m.label}</div>`
    ).join('');
  document.getElementById('tblcount').textContent = `${TABLES.length} tablas · ${RELS.length} relaciones`;
}

// ─── Render tables ───
function badgeHTML(b) {
  if (b.startsWith('DF:')) return `<span class="b b-df">DF: ${b.slice(3)}</span>`;
  if (b.startsWith('CK:')) return `<span class="b b-ck">CK: ${b.slice(3)}</span>`;
  const cls = {PK:'b-pk',FK:'b-fk',UQ:'b-uq',NN:'b-nn'}[b] || 'b-nn';
  return `<span class="b ${cls}">${b}</span>`;
}

function renderTables() {
  const stage = document.getElementById('stage');
  TABLES.forEach(t => {
    const m = MOD[t.mod];
    const el = document.createElement('div');
    el.className = 'tbl';
    el.id = 'T_' + t.id;
    el.style.left = t.x + 'px';
    el.style.top  = t.y + 'px';

    const colsHTML = t.cols.map(c => {
      const isPK = c.b.includes('PK');
      const isFK = c.b.includes('FK');
      const icon = isPK ? `<span style="color:var(--pk)">◆</span>`
                 : isFK ? `<span style="color:var(--fk)">↗</span>` : '';
      return `<div class="col">
        <div class="ci">${icon}</div>
        <div class="cb">
          <div class="cn${isPK?' pk':''}">${c.n}</div>
          <div class="ct">${c.t}</div>
        </div>
        <div class="cbadges">${c.b.map(badgeHTML).join('')}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="tbl-bar" style="background:${m.color}"></div>
      <div class="tbl-head">
        <div class="tbl-mod" style="color:${m.color}">${m.label}</div>
        <div class="tbl-name">${t.name}</div>
      </div>
      ${colsHTML}
      ${t.constraint ? `<div class="tbl-constraint">⊕ ${t.constraint}</div>` : ''}
      ${t.note ? `<div class="tbl-note">${t.note}</div>` : ''}`;
    stage.appendChild(el);
  });
}

// ─── Draw relations ───
function drawRelations() {
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';

  const map = {};
  TABLES.forEach(t => {
    const el = document.getElementById('T_' + t.id);
    map[t.id] = { x: t.x, y: t.y, w: el.offsetWidth, h: el.offsetHeight };
  });

  RELS.forEach(([fid, tid, color]) => {
    const f = map[fid];
    const t = map[tid];
    if (!f || !t) return;

    // Self-reference loop
    if (fid === tid) {
      const cx = f.x + f.w, cy = f.y + 90;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${cx},${cy} Q${cx+55},${cy-40} ${cx+55},${cy+40} Q${cx+55},${cy+80} ${cx},${cy+70}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke',color);
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-dasharray','4 3');
      path.setAttribute('opacity','0.4');
      svg.appendChild(path);
      // self arrow
      const ax = cx, ay = cy + 70;
      const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arr.setAttribute('points',`${ax},${ay} ${ax+6},${ay-8} ${ax-6},${ay-8}`);
      arr.setAttribute('fill',color); arr.setAttribute('opacity','0.5');
      svg.appendChild(arr);
      return;
    }

    const fcx = f.x + f.w/2, fcy = f.y + f.h/2;
    const tcx = t.x + t.w/2, tcy = t.y + t.h/2;
    const dx = tcx - fcx, dy = tcy - fcy;

    let p1x, p1y, p2x, p2y;
    if (Math.abs(dx) >= Math.abs(dy)) {
      // horizontal
      if (dx > 0) { p1x=f.x+f.w; p1y=fcy; p2x=t.x; p2y=tcy; }
      else         { p1x=f.x;     p1y=fcy; p2x=t.x+t.w; p2y=tcy; }
    } else {
      // vertical
      if (dy > 0) { p1x=fcx; p1y=f.y+f.h; p2x=tcx; p2y=t.y; }
      else         { p1x=fcx; p1y=f.y;     p2x=tcx; p2y=t.y+t.h; }
    }

    const adx = Math.abs(p2x-p1x), ady = Math.abs(p2y-p1y);
    let c1x, c1y, c2x, c2y;
    if (adx >= ady) {
      const off = Math.min(adx * 0.42, 130);
      c1x = p1x + (p2x>p1x?off:-off); c1y = p1y;
      c2x = p2x + (p2x>p1x?-off:off); c2y = p2y;
    } else {
      const off = Math.min(ady * 0.42, 130);
      c1x = p1x; c1y = p1y + (p2y>p1y?off:-off);
      c2x = p2x; c2y = p2y + (p2y>p1y?-off:off);
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${p1x},${p1y} C${c1x},${c1y} ${c2x},${c2y} ${p2x},${p2y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-dasharray','5 4');
    path.setAttribute('opacity','0.32');
    svg.appendChild(path);

    // Arrow head at p2
    const lx = p2x - c2x, ly = p2y - c2y;
    const len = Math.sqrt(lx*lx + ly*ly);
    if (len > 0) {
      const nx = lx/len, ny = ly/len, s = 7;
      const arr = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      const ax1 = p2x-nx*s-ny*s*0.5, ay1 = p2y-ny*s+nx*s*0.5;
      const ax2 = p2x-nx*s+ny*s*0.5, ay2 = p2y-ny*s-nx*s*0.5;
      arr.setAttribute('points',`${p2x},${p2y} ${ax1},${ay1} ${ax2},${ay2}`);
      arr.setAttribute('fill',color);
      arr.setAttribute('opacity','0.55');
      svg.appendChild(arr);
    }
  });
}

// ─── Pan & Zoom ───
const S = { x: 0, y: 0, sc: 0.6, drag: false, lx: 0, ly: 0 };

function applyT() {
  document.getElementById('stage').style.transform =
    `translate(${S.x}px,${S.y}px) scale(${S.sc})`;
  document.getElementById('zlabel').textContent = Math.round(S.sc*100)+'%';
}

function centerView() {
  const w = document.getElementById('wrap');
  const W = w.clientWidth, H = w.clientHeight;
  const cW = 2185, cH = 2230;
  S.sc = Math.min(W/cW, H/cH) * 0.92;
  S.x = (W - cW*S.sc)/2;
  S.y = (H - cH*S.sc)/2;
  applyT();
}

document.getElementById('zin').onclick  = () => { S.sc = Math.min(2.5,S.sc+0.1); applyT(); };
document.getElementById('zout').onclick = () => { S.sc = Math.max(0.15,S.sc-0.1); applyT(); };
document.getElementById('center').onclick = centerView;

const wrap = document.getElementById('wrap');
wrap.addEventListener('mousedown', e => {
  S.drag=true; S.lx=e.clientX; S.ly=e.clientY; wrap.classList.add('drag');
});
window.addEventListener('mousemove', e => {
  if(!S.drag) return;
  S.x+=e.clientX-S.lx; S.y+=e.clientY-S.ly;
  S.lx=e.clientX; S.ly=e.clientY; applyT();
});
window.addEventListener('mouseup', () => { S.drag=false; wrap.classList.remove('drag'); });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY>0 ? -0.08 : 0.08;
  const ns = Math.min(2.5, Math.max(0.15, S.sc+d));
  const r = wrap.getBoundingClientRect();
  const cx = e.clientX-r.left, cy = e.clientY-r.top;
  S.x = cx - (cx-S.x)*(ns/S.sc);
  S.y = cy - (cy-S.y)*(ns/S.sc);
  S.sc = ns; applyT();
}, {passive:false});

// Touch
let ltd = null;
wrap.addEventListener('touchstart', e => {
  if(e.touches.length===1){ S.drag=true; S.lx=e.touches[0].clientX; S.ly=e.touches[0].clientY; }
},{passive:true});
wrap.addEventListener('touchmove', e => {
  if(e.touches.length===1 && S.drag){
    S.x+=e.touches[0].clientX-S.lx; S.y+=e.touches[0].clientY-S.ly;
    S.lx=e.touches[0].clientX; S.ly=e.touches[0].clientY; applyT();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    if(ltd!==null){ S.sc=Math.min(2.5,Math.max(0.15,S.sc+(d-ltd)*0.01)); applyT(); }
    ltd=d;
  }
},{passive:true});
wrap.addEventListener('touchend', () => { S.drag=false; ltd=null; });

// ─── Init ───
renderLegend();
renderTables();
requestAnimationFrame(() => { drawRelations(); centerView(); });
</script>
