<dialog #dialogRef class="app-modal" (cancel)="onBackdropClick()" aria-labelledby="modal-title">
  <div class="modal-container">
    <header class="modal-header">
      <div>
        <h2 id="modal-title" class="modal-title">{{ title }}</h2>
        <p *ngIf="subtitle" class="modal-subtitle">{{ subtitle }}</p>
      </div>
      <button type="button" class="close-btn" (click)="closeModal()" aria-label="Cerrar modal">
        ✕
      </button>
    </header>

    <div class="modal-content">
      <ng-content></ng-content>
    </div>
  </div>
</dialog>
