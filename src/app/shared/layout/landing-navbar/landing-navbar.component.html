<nav class="nav" role="navigation" aria-label="Navegación principal">
  <div class="nav-inner">

    <!-- Logo -->
    <a routerLink="/" class="nav-logo" aria-label="World Coffee Marketplace — Inicio">
      <div class="nav-logo-icon" aria-hidden="true">☕</div>
      <div class="nav-logo-text">
        <div class="nav-logo-name">World Coffee</div>
        <div class="nav-logo-sub">Marketplace</div>
      </div>
    </a>

    <!-- Búsqueda -->
    @if (showSearch()) {
      <div class="nav-search" role="search">
        <span class="nav-search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </span>
        <input
          type="search"
          class="nav-search-input"
          [value]="searchValue()"
          placeholder="Buscar café por nombre, región o productor..."
          aria-label="Buscar productos en el catálogo"
          autocomplete="off"
          (input)="onSearch($event)"
          (keydown.enter)="onSearchEnter()"
        />
        @if (searchValue().length > 0) {
          <button
            class="nav-search-clear"
            type="button"
            (click)="clearSearch()"
            aria-label="Limpiar búsqueda"
          >✕</button>
        }
      </div>
    }

    <!-- Links de sección -->
    @if (showLinks()) {
      <div class="nav-links" role="list">
        <a
          routerLink="/"
          class="nav-link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          role="listitem"
        >Catálogo</a>
        <a href="/#sus"      class="nav-link" role="listitem">Sostenibilidad</a>
        <a href="/#prod-sec" class="nav-link" role="listitem">Productores</a>
      </div>
    }

    <!-- Acciones -->
    <div class="nav-actions">

      <!-- ── Bloque NO autenticado ── -->
      @if (!isLoggedIn()) {
        <a routerLink="/auth/login"    class="btn-nav-ghost">Iniciar sesión</a>
        <a routerLink="/auth/register" class="btn-nav-primary">Registrarse</a>
      }

      <!-- ── Bloque autenticado ── -->
      @if (isLoggedIn()) {

        <!-- Carrito (solo buyers) -->
        @if (userRole() === 'buyer') {
          <button
            class="nav-icon-btn"
            type="button"
            (click)="goToCart()"
            aria-label="Ver carrito de compras"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            @if (cartCount() > 0) {
              <span
                class="cart-badge"
                aria-live="polite"
                [attr.aria-label]="cartCount() + ' productos en carrito'"
              >{{ cartCount() }}</span>
            }
          </button>
        }

        <!-- Notificaciones -->
        <button
          class="nav-icon-btn"
          type="button"
          aria-label="Notificaciones"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>

        <!-- Avatar + nombre -->
        <button
          class="nav-user-btn"
          type="button"
          (click)="goToDashboard()"
          [attr.aria-label]="'Ir al panel de ' + firstName()"
        >
          <span class="nav-avatar" aria-hidden="true">{{ userInitial() }}</span>
          <span class="nav-username">{{ firstName() }}</span>
        </button>

        <!-- Cerrar sesión -->
        <button
          class="nav-icon-btn danger"
          type="button"
          (click)="logout()"
          aria-label="Cerrar sesión"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      }

    </div>

  </div>
</nav>
