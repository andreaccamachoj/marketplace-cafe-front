<div class="certs-list">
  @for (cert of certifications(); track cert.id) {
    <div class="cert-item">
      <div class="cert-item-icon">{{ cert.icon }}</div>
      <div class="cert-item-info">
        <div class="cert-item-name">{{ cert.name }}</div>
        <div class="cert-item-body">{{ cert.body }}</div>
      </div>
      <span
        class="cert-item-status"
        [class.cert-valid]="cert.status === 'valid'"
        [class.cert-expire]="cert.status === 'expiring'"
      >
        Válida hasta {{ cert.validUntil }}
      </span>
    </div>
  }
</div>
