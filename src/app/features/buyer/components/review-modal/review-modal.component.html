@if (open()) {
  <div
    class="review-overlay"
    (click)="onOverlayClick($event)"
    (keydown.escape)="closed.emit()"
    role="dialog"
    aria-modal="true"
    tabindex="-1"
    [attr.aria-label]="'Reseña de ' + productName()"
  >
    <div class="review-modal" tabindex="-1" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
      <div class="review-modal-title">Califica tu compra</div>
      <div class="review-modal-sub">{{ productName() }}</div>

      <div class="stars-input" role="group" aria-label="Calificación de 1 a 5 estrellas">
        @for (star of starValues; track star) {
          <button
            class="star-btn"
            [class.active]="displayRating() >= star"
            type="button"
            (click)="rating.set(star)"
            (mouseenter)="hoverRating.set(star)"
            (mouseleave)="hoverRating.set(0)"
            [attr.aria-label]="star + ' estrella' + (star > 1 ? 's' : '')"
          >★</button>
        }
      </div>

      <textarea
        class="review-textarea"
        placeholder="Cuéntanos tu experiencia con este café..."
        [value]="comment()"
        (input)="onInput($event)"
        rows="4"
        aria-label="Comentario de reseña"
      ></textarea>

      <div class="review-modal-footer">
        <button
          class="btn-modal-cancel"
          type="button"
          (click)="closed.emit()"
        >Cancelar</button>
        <button
          class="btn-modal-submit"
          type="button"
          [disabled]="rating() === 0"
          (click)="onSubmit()"
        >Enviar reseña</button>
      </div>
    </div>
  </div>
}
