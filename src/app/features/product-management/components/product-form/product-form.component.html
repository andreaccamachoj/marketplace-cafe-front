<form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="product-form">

  <div class="form-row grid-2">
    <div class="form-group">
      <label for="name">{{ COPY.LABELS.NAME }} <span class="required">*</span></label>
      <input
        id="name"
        type="text"
        formControlName="name"
        [placeholder]="COPY.PLACEHOLDERS.NAME"
        [attr.aria-invalid]="f.name.invalid && f.name.touched"
      >
      <small class="error-text" *ngIf="f.name.invalid && f.name.touched">El nombre es obligatorio</small>
    </div>

    <div class="form-group">
      <label for="category">{{ COPY.LABELS.CATEGORY }} <span class="required">*</span></label>
      <div class="select-wrapper">
        <select id="category" formControlName="category">
          <option value="" disabled selected>{{ COPY.PLACEHOLDERS.CATEGORY }}</option>
          <option value="cafe-origen">Café de Origen</option>
          <option value="cafe-blend">Blend</option>
        </select>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label for="description">{{ COPY.LABELS.DESCRIPTION }} <span class="required">*</span></label>
    <textarea
      id="description"
      formControlName="description"
      rows="4"
      [placeholder]="COPY.PLACEHOLDERS.DESCRIPTION">
    </textarea>
    <div class="textarea-footer">
      <small>Describe el perfil sensorial y el proceso de beneficio.</small>
      <small class="char-counter">{{ f.description.value?.length || 0 }}/300</small>
    </div>
  </div>

  <div class="form-row grid-3">
    <div class="form-group">
      <label for="price">{{ COPY.LABELS.PRICE }} <span class="required">*</span></label>
      <input id="price" type="number" formControlName="price" placeholder="48000" min="0">
    </div>

    <div class="form-group">
      <label for="unit">{{ COPY.LABELS.UNIT }}</label>
      <div class="select-wrapper">
        <select id="unit" formControlName="unit">
          <option [ngValue]="null" disabled>Seleccionar...</option>
          <option value="500g">500g</option>
          <option value="1kg">1kg</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="stock">{{ COPY.LABELS.STOCK }} <span class="required">*</span></label>
      <input id="stock" type="number" formControlName="stock" placeholder="100" min="0">
    </div>
  </div>

  <div class="form-group">
    <label>{{ COPY.LABELS.IMAGES }}</label>
    <div
      class="drop-zone"
      appDragDrop
      (fileDropped)="onFilesDropped($event)"
      (click)="fileInput.click()"
      [class.has-error]="f.images.invalid && f.images.touched">

      <input
        type="file"
        #fileInput
        multiple
        accept="image/jpeg, image/png"
        class="hidden-input"
        (change)="onFileSelected($event)"
      >

      <div class="drop-content">
        <span class="icon-camera">📷</span>
        <p>Haz clic o arrastra tus imágenes aquí</p>
        <small>JPG, PNG · máx. 5 MB por imagen</small>
      </div>
    </div>
    <small class="error-text" *ngIf="f.images.errors?.['minLengthArray'] && f.images.touched">
      Debes subir al menos 3 imágenes.
    </small>
  </div>

  <div class="form-group">
    <label>{{ COPY.LABELS.CERTIFICATIONS }}</label>
    <div class="pills-group">
      <button type="button" class="pill" (click)="toggleCertification('ORGANIC')" [class.active]="hasCertification('ORGANIC')">🌿 Orgánico</button>
      <button type="button" class="pill" (click)="toggleCertification('FAIRTRADE')" [class.active]="hasCertification('FAIRTRADE')">⚖️ Fairtrade</button>
      <button type="button" class="pill" (click)="toggleCertification('RAINFOREST')" [class.active]="hasCertification('RAINFOREST')">🌊 Rainforest Alliance</button>
    </div>
  </div>

  <div class="form-group">
    <label>{{ COPY.LABELS.STATUS }}</label>
    <div class="status-group">
      <label class="status-card" [class.selected]="f.status.value === 'DRAFT'">
        <input type="radio" formControlName="status" value="DRAFT" class="visually-hidden">
        📄 Borrador
      </label>

      <label class="status-card success" [class.selected]="f.status.value === 'PUBLISHED'">
        <input type="radio" formControlName="status" value="PUBLISHED" class="visually-hidden">
        ✓ Publicado
      </label>

      <label class="status-card" [class.selected]="f.status.value === 'INACTIVE'">
        <input type="radio" formControlName="status" value="INACTIVE" class="visually-hidden">
        ⏸ Inactivo
      </label>
    </div>
    <small class="hint-text">Solo los productos "Publicados" aparecen en el catálogo público.</small>
  </div>

  <div class="form-actions">
    <button type="button" class="btn-secondary" (click)="onCancel()">{{ COPY.BUTTONS.CANCEL }}</button>
    <button type="submit" class="btn-primary" [disabled]="productForm.invalid">
      💾 {{ COPY.BUTTONS.SAVE }}
    </button>
  </div>
</form>
