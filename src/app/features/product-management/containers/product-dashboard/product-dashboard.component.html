<div class="dashboard-layout">
  <h1>Catálogo de Productos</h1>
  <button class="btn-primary" (click)="openProductModal()">Agregar Producto</button>

  <app-modal
    [(isOpen)]="isModalOpen"
    [title]="COPY.TITLE"
    [subtitle]="COPY.SUBTITLE">

    @if (isModalOpen) {
      <app-product-form
        (save)="handleSaveProduct($event)"
        (formCancel)="closeProductModal()">
      </app-product-form>
    }

  </app-modal>
</div>
