name: SonarCloud analysis

on:
  push:
    branches: [ "main", "feature" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para que Sonar analice bien el historial/PR

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # ajusta a la versión que use tu proyecto

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci   # o el script que dispare `ng test --no-watch --code-coverage`

      - name: Verify lcov file exists
        run: ls -la coverage/ && cat coverage/lcov.info | head -20

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args:
            -Dsonar.projectKey=andreaccamachoj_marketplace-cafe-front
            -Dsonar.organization=andreaccamachoj
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.exclusions=**/*.spec.ts,**/node_modules/**,**/coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          projectBaseDir: .
